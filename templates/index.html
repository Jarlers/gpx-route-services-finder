<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPX Route Services</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/styles.css?v=segments-8" />
  </head>
  <body>
    <main class="app-shell">
      <section class="sidebar" aria-label="Route analysis" data-i18n-attr="aria-label:sidebarLabel">
        <div class="brand">
          <h1 class="brand-title">
            <span>GPX Route Services</span>
            <span class="brand-byline">by Jarlers</span>
          </h1>
          <p data-i18n="tagline">Fuel, lodging, camping and food within 5 km of the route.</p>
        </div>

        <form id="upload-form" class="upload-form">
          <label for="gpx-file" data-i18n="gpxFile">GPX file</label>
          <input id="gpx-file" name="file" type="file" accept=".gpx,application/gpx+xml" required />

          <div class="settings-grid">
            <label for="radius-km">
              <span data-i18n="searchRadius">Search radius</span>
              <select id="radius-km" name="radiusKm">
                <option value="2">2 km</option>
                <option value="5" selected>5 km</option>
                <option value="10">10 km</option>
                <option value="20">20 km</option>
              </select>
            </label>

            <label for="stage-km">
              <span data-i18n="dailyStage">Daily stage</span>
              <input id="stage-km" name="stageKm" type="number" min="50" max="1000" step="25" value="250" />
            </label>

            <label for="language-select">
              <span data-i18n="language">Language</span>
              <select id="language-select" name="language">
                <option value="en" selected>English</option>
                <option value="sv">Svenska</option>
              </select>
            </label>
          </div>

          <button type="submit" data-i18n="analyzeRoute">Analyze route</button>
        </form>

        <div id="status" class="status" role="status" data-i18n="initialStatus">Choose a GPX file to begin.</div>
        <div id="segment-status" class="segment-status" hidden></div>
        <button id="next-segment" class="secondary-button" type="button" hidden data-i18n="searchNextSegment">Search next segment</button>

        <div class="filters" aria-label="Filters" data-i18n-attr="aria-label:filtersLabel">
          <label><input type="checkbox" value="fuel" checked /> <span data-i18n="fuelStations">Fuel stations</span></label>
          <label><input type="checkbox" value="hotel" checked /> <span data-i18n="lodging">Lodging</span></label>
          <label><input type="checkbox" value="camping" checked /> <span data-i18n="camping">Camping</span></label>
          <label><input type="checkbox" value="food" checked /> <span data-i18n="food">Food</span></label>
        </div>

        <div class="route-results">
          <div class="results-header">
            <h2 data-i18n="matchesAlongRoute">Matches along the route</h2>
            <span id="results-count">0 places</span>
          </div>

          <div class="stages-panel">
            <div class="results-header">
              <h2 data-i18n="dailyStages">Daily stages</h2>
              <span id="stages-count">0 days</span>
            </div>
            <ol id="stages-list" class="stages-list"></ol>
          </div>

          <ol id="places-list" class="places-list"></ol>
        </div>
      </section>

      <section class="map-panel" aria-label="Map" data-i18n-attr="aria-label:mapLabel">
        <div id="map"></div>
      </section>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/app.js?v=segments-2"></script>
  </body>
</html>
